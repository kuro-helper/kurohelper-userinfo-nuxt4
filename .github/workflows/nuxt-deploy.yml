name: Nuxt Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
    steps:
      - name: Check Secrets
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_IP VPS_USERNAME VPS_SSH_PASSWORD VPS_DEPLOY_BASE; do
            if [ -z "${!name:-}" ]; then
              echo "::error::缺少必要的 Secret：$name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  build:
    needs: preflight
    permissions:
      contents: read
      actions: write
    uses: kuro-helper/.github/.github/workflows/nuxt-build.yml@main
    with:
      nuxt_output_name: ${{ format('{0}-{1}', github.event.repository.name, github.ref_name) }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: dist

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload to VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          output_name="$(ls -1 dist | head -n 1)"
          if [ -z "$output_name" ]; then
            echo "::error::找不到編譯產物"
            exit 1
          fi

          deploy_base="${VPS_DEPLOY_BASE%/}"
          target_path="${deploy_base}/${REPO_NAME}"

          ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          remote="${VPS_USERNAME}@${VPS_IP}"

          echo "部署 ref：${{ github.ref }} (${{ github.sha }})"
          echo "上傳產物：$output_name"

          deploy_name="$output_name"
          if sshpass -e ssh $ssh_opts "$remote" "[ -d '$target_path/$deploy_name' ]"; then
            deploy_name="${output_name}-$(date -u +%Y%m%d%H%M%S)"
          fi

          sshpass -e scp $ssh_opts -r "dist/$output_name" "$remote:$target_path/$deploy_name"

          echo "已部署 $deploy_name ($REPO_NAME)"
